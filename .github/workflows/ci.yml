name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.runtime }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        runtime: [node, bun]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # We deliberately don't commit a package-lock.json: native rollup
      # binaries (used transitively by vitest/tsup) are pinned per-platform
      # and a Windows-generated lockfile breaks Linux CI. Each job installs
      # fresh against the registry, which only adds ~10s and avoids the bug.

      - name: Install dependencies (npm)
        if: matrix.runtime == 'node'
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Install dependencies (bun)
        if: matrix.runtime == 'bun'
        run: bun install --no-save

      - name: Typecheck (node)
        if: matrix.runtime == 'node'
        run: npx --no-install tsc --noEmit

      - name: Typecheck (bun)
        if: matrix.runtime == 'bun'
        run: bunx tsc --noEmit

      - name: Run tests (node)
        if: matrix.runtime == 'node'
        run: npx --no-install vitest run

      - name: Run tests (bun)
        if: matrix.runtime == 'bun'
        run: bunx vitest run

      - name: Build (node)
        if: matrix.runtime == 'node'
        run: npx --no-install tsup

      - name: Build (bun)
        if: matrix.runtime == 'bun'
        run: bunx tsup

      - name: Verify build artifacts
        shell: bash
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/cli.js
          echo "All build artifacts present."
