name: Release

# Publishes tytube to npm when a GitHub Release is published, OR when a tag
# matching v* is pushed (whichever you prefer). Reuses the same NPM_TOKEN secret
# pattern as the vectorless repo.
#
# To cut a release:
#   1. Bump the version in package.json (and src/version.ts).
#   2. Commit + tag: `git tag v0.1.1 && git push --tags`
#   3. (Optional) Create a GitHub Release pointing at the tag.
#
# The workflow runs the full test suite first, then publishes only if tests pass.

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run only (no actual publish)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Typecheck
        run: npx --no-install tsc --noEmit

      - name: Run tests
        run: npx --no-install vitest run

      - name: Build
        run: npx --no-install tsup

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
