name: Release

# Verifies a release-tagged build passes typecheck + tests + bundle, then
# performs an `npm publish --dry-run` as a final smoke test (validates auth
# and the tarball without actually publishing).
#
# Real publishes are currently performed locally via `npm publish --access public`
# because the GitHub Actions runner IP range is being rejected by npm with an
# opaque 404 when using a granular access token to write to the @hallelx scope —
# even though the same token works locally and even though the package is already
# in the registry. The long-term fix is to switch to npm Trusted Publishing via
# OIDC (no token at all), tracked for v0.2.
#
# To cut a release today:
#   1. Bump version in package.json + src/version.ts
#   2. Commit, tag (`git tag v0.1.x`), push tag — this kicks off this workflow
#   3. Once the verify job is green, run `npm publish --access public` from a
#      local checkout
#   4. Create the GitHub Release for changelog visibility

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Typecheck
        run: npx --no-install tsc --noEmit

      - name: Run tests
        run: npx --no-install vitest run

      - name: Build
        run: npx --no-install tsup

      - name: Verify package tarball
        run: npm pack --dry-run

      - name: Validate publish (dry run)
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
